aid: yassir
name: Yassir
description: >-
  Yassir is an Algerian-founded super app providing on-demand and financial
  services across the Maghreb, sub-Saharan Africa, Canada, and France. Founded
  in 2017 by Noureddine Tayebi and headquartered in Palo Alto, California with
  operations centered in Algiers, the company bundles ride-hailing (Yassir
  Ride), food delivery (Yassir Food), grocery delivery (Yassir Market), and
  digital financial services (Yassir Cash) into a single consumer mobile app,
  alongside a Yassir B2B suite covering corporate mobility, meal benefits,
  procurement, parcel delivery, and digital gift cards. Yassir reports more
  than six million users, 130,000+ driver and merchant partners, and 4,500
  employees operating across cities in Algeria, Morocco, Tunisia, South
  Africa, Senegal, Canada, and France. The company has raised roughly $193M
  to date, including a $150M Series B led by BOND with participation from Y
  Combinator and DN Capital, and a global sponsorship partnership with Paris
  Saint-Germain. Yassir is a consumer and merchant-facing super app: it
  operates iOS and Android apps and a business portal (go-business.yassir.com)
  but does not publish a public developer API, SDK, OpenAPI specification, or
  open-source project. Driver, courier, restaurant, and store onboarding flow
  through partner sign-up forms rather than a developer program, and the
  yassir-tech GitHub organization currently has no public repositories.
